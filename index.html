<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Accuracy QR Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col justify-between">

    <div class="max-w-3xl mx-auto px-4 py-8 w-full flex-grow">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">🚀 High-Accuracy QR Scanner</h1>
            <p class="text-gray-600">Powered by Cloud AI to handle print, screenshots, and handwriting.</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-md mb-6 flex flex-col justify-center items-center">
            <label class="w-full sm:w-auto flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-lg cursor-pointer transition-all shadow-sm">
                <span>Select Image / Screenshot</span>
                <input type="file" id="imageInput" accept="image/*" class="hidden">
            </label>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div id="previewContainer" class="bg-white p-4 rounded-xl shadow-md flex flex-col items-center justify-center min-h-[250px] border-2 border-dashed border-gray-300">
                <p id="previewPlaceholder" class="text-gray-400 text-sm text-center">Your image preview</p>
                <img id="imagePreview" class="max-h-64 rounded-lg hidden shadow-sm" alt="Preview">
            </div>

            <div class="bg-white p-4 rounded-xl shadow-md flex flex-col min-h-[250px]">
                <h3 class="text-lg font-semibold text-gray-700 mb-2 border-b pb-1">Detected Text</h3>
                <div id="statusContainer" class="hidden flex-col items-center justify-center flex-grow py-4">
                    <div class="spinner mb-2"></div>
                    <p id="statusText" class="text-blue-600 font-medium text-sm">Consulting Cloud AI...</p>
                </div>
                <textarea id="textOutput" class="w-full flex-grow p-2 border border-gray-200 rounded-lg resize-none text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Extracted text lines will appear here..."></textarea>
                <button id="regenerateBtn" class="mt-3 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-lg transition-all hidden">
                    Refresh QR Codes
                </button>
            </div>
        </div>

        <div id="qrSection" class="hidden">
            <h2 class="text-xl font-bold text-gray-800 mb-4">🎯 Generated QR Codes</h2>
            <div id="qrGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
        </div>
    </div>

    <footer class="w-full text-center py-4 border-t border-gray-200 bg-gray-50 text-xs text-gray-400 tracking-wide">
        Photo to QR Generator &bull;
        <span class="font-mono">v1.3.0</span>
    </footer>

    <script>
        const OCR_SPACE_KEY = 'K81999659888957'; // Note: Move to backend for production security
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewPlaceholder = document.getElementById('previewPlaceholder');
        const textOutput = document.getElementById('textOutput');
        const statusContainer = document.getElementById('statusContainer');
        const statusText = document.getElementById('statusText');
        const regenerateBtn = document.getElementById('regenerateBtn');
        const qrSection = document.getElementById('qrSection');
        const qrGrid = document.getElementById('qrGrid');

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Show the image preview instantly using standard object URLs
            imagePreview.src = URL.createObjectURL(file);
            imagePreview.classList.remove('hidden');
            previewPlaceholder.classList.add('hidden');
          
            // Send the raw file directly to the high-speed processing engine
            compressAndProcessMobile(file);

            // Clear the input value so the change event fires if the user selects the same file again
            e.target.value = '';
        });

        // Hardware-accelerated scaling engine to prevent mobile thread locks
        async function compressAndProcessMobile(fileObject) {
            textOutput.classList.add('hidden');
            statusContainer.classList.remove('hidden');
            regenerateBtn.classList.add('hidden');
            qrSection.classList.add('hidden');
            
            // Ensure spinner is visible if it was hidden during a previous error
            statusContainer.querySelector('.spinner').classList.remove('hidden');
            statusText.innerText = "Optimizing picture layout size...";

            try {
                // Read the file's natural dimensions first without fully loading it
                const bitmapHeader = await createImageBitmap(fileObject);
                const originalWidth = bitmapHeader.width;
                const originalHeight = bitmapHeader.height;
                bitmapHeader.close(); // Immediately release header memory

                // Calculate strict downscaling targets (Max 1200px)
                const MAX_DIM = 1200;
                let targetWidth = originalWidth;
                let targetHeight = originalHeight;

                if (originalWidth > originalHeight) {
                    if (originalWidth > MAX_DIM) {
                        targetHeight = Math.round((originalHeight * MAX_DIM) / originalWidth);
                        targetWidth = MAX_DIM;
                    }
                } else {
                    if (originalHeight > MAX_DIM) {
                        targetWidth = Math.round((originalWidth * MAX_DIM) / originalHeight);
                        targetHeight = MAX_DIM;
                    }
                }

                // Use the browser's hardware-accelerated resizer.
                const resizedBitmap = await createImageBitmap(fileObject, {
                    resizeWidth: targetWidth,
                    resizeHeight: targetHeight,
                    resizeQuality: 'high'
                });

                // Dynamically create the canvas to avoid DOM reference issues
                const scaleCanvas = document.createElement('canvas');
                const ctx = scaleCanvas.getContext('2d');
                scaleCanvas.width = targetWidth;
                scaleCanvas.height = targetHeight;
                
                // Clear and paint the clean bitmap
                ctx.clearRect(0, 0, targetWidth, targetHeight);
                ctx.drawImage(resizedBitmap, 0, 0);
                
                // Release the bitmap from memory immediately after drawing
                resizedBitmap.close();

                // Export compressed JPEG string for cloud upload
                const base64Image = scaleCanvas.toDataURL('image/jpeg', 0.8);
                runCloudOcr(base64Image);

            } catch (err) {
                console.error(err);
                statusContainer.querySelector('.spinner').classList.add('hidden');
                statusText.innerHTML = `<span class="text-red-500 font-bold">Optimization Failed</span><br><span class="text-xs text-gray-500 mt-1 block">Your device blocked the image resizing step or lacks hardware acceleration.</span>`;
            }
        }

        async function runCloudOcr(base64Data) {
            statusText.innerText = "Extracting line items via Cloud AI...";
            
            const details = {
                'apikey': OCR_SPACE_KEY,
                'base64Image': base64Data,
                'language': 'eng',
                'isOverlayRequired': 'false',
                'OCREngine': '1'
            };

            let formBody = [];
            for (let property in details) {
                let encodedKey = encodeURIComponent(property);
                let encodedValue = encodeURIComponent(details[property]);
                formBody.push(encodedKey + "=" + encodedValue);
            }
            formBody = formBody.join("&");

            try {
                const response = await fetch('https://api.ocr.space/parse/image', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
                    },
                    body: formBody
                });

                if (!response.ok) {
                    throw new Error(`Connection drop: HTTP ${response.status}`);
                }

                const result = await response.json();
                
                if (result.IsErroredOnProcessing) {
                    const errorDetails = result.ErrorMessage ? result.ErrorMessage.join(", ") : "Processing limits hit.";
                    throw new Error(errorDetails);
                }

                if (result.ParsedResults && result.ParsedResults.length > 0) {
                    const parsedText = result.ParsedResults[0].ParsedText;
                    const cleanedText = parsedText.split(/\r?\n/)
                                                .map(line => line.trim())
                                                .filter(line => line.length > 2)
                                                .join('\n');
                    
                    textOutput.value = cleanedText;
                    statusContainer.classList.add('hidden');
                    textOutput.classList.remove('hidden');
                    regenerateBtn.classList.remove('hidden');

                    generateQRCodes(cleanedText);
                } else {
                    throw new Error("Could not find legible text lines.");
                }

            } catch (error) {
                console.error(error);
                statusContainer.querySelector('.spinner').classList.add('hidden');
                statusText.innerHTML = `
                    <span class="text-red-500 font-bold">Cloud Image Error</span><br>
                    <span class="text-xs text-gray-500 mt-1 block max-w-xs mx-auto">${error.message}</span>
                `;
            }
        }

        function generateQRCodes(text) {
            qrGrid.innerHTML = '';
            const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            
            if (lines.length === 0) {
                qrSection.classList.add('hidden');
                return;
            }

            qrSection.classList.remove('hidden');
            
            lines.forEach((line, index) => {
                const encodedText = encodeURIComponent(line);
                const qrUrl = `https://quickchart.io/qr?text=${encodedText}&size=200&margin=2&ecLevel=M`;

                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow border border-gray-100 flex flex-col items-center justify-between text-center";
                card.innerHTML = `
                    <div class="w-full text-xs font-semibold text-gray-400 mb-2 text-left">LINE ${index + 1}</div>
                    <div class="bg-gray-50 p-2 rounded-lg mb-3 flex items-center justify-center min-h-[160px]">
                        <img src="${qrUrl}" alt="QR" class="w-40 h-40 object-contain">
                    </div>
                    <p class="text-xs text-gray-700 font-mono break-all line-clamp-2 w-full bg-gray-50 p-1.5 rounded border border-gray-200">
                        ${escapeHtml(line)}
                    </p>
                `;
                qrGrid.appendChild(card);
            });
        }

        regenerateBtn.addEventListener('click', () => {
            generateQRCodes(textOutput.value);
        });

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
