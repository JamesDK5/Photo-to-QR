<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Photo & Screenshot QR Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-3xl mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">📸 Universal Text-to-QR Scanner</h1>
            <p class="text-gray-600">Works with standard photos, screen pictures, and digital screenshots.</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-md mb-6 flex flex-col sm:flex-row gap-4 justify-center items-center">
            <label class="w-full sm:w-auto flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-lg cursor-pointer transition-all shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                <span>Upload Image / Screenshot</span>
                <input type="file" id="imageInput" accept="image/*" class="hidden">
            </label>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div id="previewContainer" class="bg-white p-4 rounded-xl shadow-md flex flex-col items-center justify-center min-h-[250px] border-2 border-dashed border-gray-300">
                <p id="previewPlaceholder" class="text-gray-400 text-sm text-center">Your uploaded image will appear here</p>
                <img id="imagePreview" class="max-h-64 rounded-lg hidden shadow-sm" alt="Preview">
            </div>

            <div class="bg-white p-4 rounded-xl shadow-md flex flex-col min-h-[250px]">
                <h3 class="text-lg font-semibold text-gray-700 mb-2 border-b pb-1">Detected Text</h3>
                <div id="statusContainer" class="hidden flex-col items-center justify-center flex-grow py-4">
                    <div class="spinner mb-2"></div>
                    <p id="statusText" class="text-blue-600 font-medium text-sm">Processing...</p>
                </div>
                <textarea id="textOutput" class="w-full flex-grow p-2 border border-gray-200 rounded-lg resize-none text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Extracted text lines will appear here. You can manually edit them before generating QRs."></textarea>
                <button id="regenerateBtn" class="mt-3 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-lg transition-all hidden">
                    Refresh QR Codes
                </button>
            </div>
        </div>

        <div id="qrSection" class="hidden">
            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span>🎯 Generated QR Codes</span>
                <span id="qrCount" class="bg-blue-100 text-blue-800 text-xs px-2.5 py-0.5 rounded-full font-semibold">0</span>
            </h2>
            <div id="qrGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                </div>
        </div>
    </div>

    <canvas id="processingCanvas" class="hidden"></canvas>

    <script>
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewPlaceholder = document.getElementById('previewPlaceholder');
        const previewContainer = document.getElementById('previewContainer');
        const textOutput = document.getElementById('textOutput');
        const statusContainer = document.getElementById('statusContainer');
        const statusText = document.getElementById('statusText');
        const regenerateBtn = document.getElementById('regenerateBtn');
        const qrSection = document.getElementById('qrSection');
        const qrGrid = document.getElementById('qrGrid');
        const qrCount = document.getElementById('qrCount');
        const canvas = document.getElementById('processingCanvas');

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                imagePreview.src = event.target.result;
                imagePreview.classList.remove('hidden');
                previewPlaceholder.classList.add('hidden');
                previewContainer.classList.remove('border-dashed');
                
                preprocessAndScan(event.target.result);
            }
            reader.readAsDataURL(file);
        });

        // Advanced Upscaling Preprocessing for Low-Res Screenshots
        function preprocessAndScan(imageSrc) {
            textOutput.value = '';
            textOutput.classList.add('hidden');
            statusContainer.classList.remove('hidden');
            regenerateBtn.classList.add('hidden');
            qrSection.classList.add('hidden');
            statusText.innerText = "Upscaling screenshot resolution...";

            const img = new Image();
            img.onload = function() {
                const ctx = canvas.getContext('2d');
                
                // CRITICAL FIX: Magnify screenshot scale by 3x to artificially simulate high 300 DPI print quality
                const scaleFactor = 3;
                canvas.width = img.width * scaleFactor;
                canvas.height = img.height * scaleFactor;
                
                // Ensure crisp font rendering when enlarging pixels
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                
                // Blend channels into high contrast grayscale 
                ctx.filter = 'grayscale(1) contrast(1.5)';
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                canvas.toBlob(async function(blob) {
                    runOcr(blob);
                }, 'image/png'); // Using PNG to avoid compression artifacts on text edges
            };
            img.src = imageSrc;
        }

        async function runOcr(imageBlob) {
            try {
                const worker = await Tesseract.createWorker('eng');
                
                // Enforce alphanumeric characters and common pack symbols
                await worker.setParameters({
                    tessedit_char_whitelist: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 -',
                    tessedit_pageseg_mode: '6' // Assumption of a single uniform block of text layout
                });
                
                worker.logger = (m) => {
                    if (m.status === 'recognizing text') {
                        statusText.innerText = `Analyzing layout: ${Math.round(m.progress * 100)}%`;
                    } else {
                        statusText.innerText = "Reconstructing text lines...";
                    }
                };

                const { data: { text } } = await worker.recognize(imageBlob);
                await worker.terminate();

                // Clean the layout array out 
                const cleanedText = text.split('\n')
                                        .map(line => line.trim())
                                        .filter(line => line.length > 3 && !line.toLowerCase().includes('current packs'))
                                        .join('\n');

                textOutput.value = cleanedText;
                statusContainer.classList.add('hidden');
                textOutput.classList.remove('hidden');
                regenerateBtn.classList.remove('hidden');

                generateQRCodes(cleanedText);

            } catch (error) {
                console.error(error);
                statusText.innerText = "Processing error. Please verify image input.";
                statusContainer.querySelector('.spinner').classList.add('hidden');
            }
        }

        function generateQRCodes(text) {
            qrGrid.innerHTML = '';
            const lines = text.split('\n')
                              .map(line => line.trim())
                              .filter(line => line.length > 0);

            if (lines.length === 0) {
                qrSection.classList.add('hidden');
                return;
            }

            qrCount.innerText = lines.length;
            qrSection.classList.remove('hidden');

            lines.forEach((line, index) => {
                const encodedText = encodeURIComponent(line);
                const qrUrl = `https://quickchart.io/qr?text=${encodedText}&size=200&margin=2&ecLevel=M`;

                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow border border-gray-100 flex flex-col items-center justify-between text-center transition-all hover:shadow-md";

                card.innerHTML = `
                    <div class="w-full text-xs font-semibold text-gray-400 mb-2 text-left">LINE ${index + 1}</div>
                    <div class="bg-gray-50 p-2 rounded-lg mb-3 flex items-center justify-center min-h-[160px] min-w-[160px]">
                        <img src="${qrUrl}" alt="QR Code for line ${index + 1}" class="w-40 h-40 object-contain" loading="lazy">
                    </div>
                    <p class="text-xs text-gray-700 font-mono break-all line-clamp-2 w-full bg-gray-50 p-1.5 rounded border border-gray-200" title="${line}">
                        ${escapeHtml(line)}
                    </p>
                `;
                qrGrid.appendChild(card);
            });
        }

        regenerateBtn.addEventListener('click', () => {
            generateQRCodes(textOutput.value);
        });

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
